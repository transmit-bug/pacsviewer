# E2E Tests — Run agent-browser scenarios
#
# Triggers:
# - Push to main/master
# - Pull requests
# - Manual dispatch

name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run (empty for all)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'
  BUN_VERSION: 'latest'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Optional: backend service for testing
      # server:
      #   image: pacsviewer-server:latest
      #   ports:
      #     - 3000:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build:web

      - name: Start dev server
        run: |
          bun run dev:web &
          sleep 5
        env:
          NODE_ENV: test

      - name: Install agent-browser
        run: |
          # Install agent-browser CLI
          # npm install -g agent-browser
          echo "agent-browser installation placeholder"

      - name: Run smoke tests
        if: ${{ github.event.inputs.scenario == '' }}
        run: |
          cd .agent_browser
          chmod +x run.sh check.sh trace.sh
          ./run.sh smoke
        env:
          CI: true

      - name: Run specific scenario
        if: ${{ github.event.inputs.scenario != '' }}
        run: |
          cd .agent_browser
          chmod +x run.sh check.sh trace.sh
          ./run.sh ${{ github.event.inputs.scenario }}
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: .agent_browser/reports/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: .agent_browser/reports/*.png
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find latest results
            const reportsDir = '.agent_browser/reports';
            const resultFiles = fs.readdirSync(reportsDir)
              .filter(f => f.startsWith('results_'))
              .sort()
              .reverse();
            
            if (resultFiles.length === 0) {
              console.log('No results found');
              return;
            }
            
            const results = fs.readFileSync(path.join(reportsDir, resultFiles[0]), 'utf8');
            const lines = results.trim().split('\n');
            const total = lines.length;
            const passed = lines.filter(l => l === 'PASS').length;
            const failed = lines.filter(l => l.startsWith('FAIL')).length;
            
            const status = failed === 0 ? '✅' : '❌';
            const body = `## ${status} E2E Test Results
            
            | Metric | Count |
            |--------|-------|
            | Total | ${total} |
            | Passed | ${passed} |
            | Failed | ${failed} |
            
            ${failed > 0 ? '**Failed scenarios:**\n' + lines
              .filter(l => l.startsWith('FAIL:'))
              .map(l => '- ' + l.replace('FAIL:', ''))
              .join('\n') : ''}
            
            <details>
            <summary>Full results</summary>
            
            \`\`\`
            ${results}
            \`\`\`
            </details>
            
            *Run #${{ github.run_number }}*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Optional: Run in parallel for different browsers
  # e2e-firefox:
  #   runs-on: ubuntu-latest
  #   steps: ...
  
  # e2e-webkit:
  #   runs-on: ubuntu-latest
  #   steps: ...
